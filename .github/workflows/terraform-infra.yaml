name: Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/**/*.tf"
      - "infrastructure/**/*.tfvars"
      - "src/main/resources/openapi/**"
      - ".github/workflows/terraform-infra.yaml"
  pull_request:
    branches:
      - main
    paths:
      - "infrastructure/**/*.tf"
      - "infrastructure/**/*.tfvars"
      - "src/main/resources/openapi/**"
      - ".github/workflows/terraform-infra.yaml"
  workflow_dispatch:
    inputs:
      overrideAction:
        description: "Run plan or apply"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: terraform-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  precheck:
    name: Terraform Precheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Terraform format check
        uses: hmcts/cnp-githubactions-library/terraform-fmt@main
        with:
          working-directory: infrastructure
          recursive: true

  discover-environments:
    name: Discover tfvars environments
    needs: precheck
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      has_envs: ${{ steps.matrix.outputs.has_envs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build deployment matrix from tfvars files
        id: matrix
        shell: bash
        run: |
          set -euo pipefail

          matrix='[]'
          found="false"

          for file in infrastructure/*.tfvars; do
            if [ ! -f "$file" ]; then
              continue
            fi

            env_name="${file%.tfvars}"
            env_name="${env_name#infrastructure/}"
            env_upper="$(echo "$env_name" | tr '[:lower:]-' '[:upper:]_')"

            if [ "$env_name" = "prod" ]; then
              storage_var="TFSTATE_STORAGE_ACCOUNT_PROD"
            else
              storage_var="TFSTATE_STORAGE_ACCOUNT_NONPROD"
            fi

            item="$(jq -nc \
              --arg environment "$env_name" \
              --arg subscription_var "AZURE_SUBSCRIPTION_${env_upper}" \
              --arg storage_account_var "$storage_var" \
              --arg azure_client_id_var "AZURE_CLIENT_ID_${env_upper}" \
              --arg azure_subscription_id_var "AZURE_SUBSCRIPTION_ID_${env_upper}" \
              '{
                environment: $environment,
                subscription_var: $subscription_var,
                storage_account_var: $storage_account_var,
                azure_client_id_var: $azure_client_id_var,
                azure_subscription_id_var: $azure_subscription_id_var
              }')"

            matrix="$(jq -nc --argjson m "$matrix" --argjson i "$item" '$m + [$i]')"
            found="true"
          done

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "has_envs=$found" >> "$GITHUB_OUTPUT"

  terraform:
    name: Terraform ${{ matrix.environment }}
    needs: [ discover-environments ]
    if: ${{ needs['discover-environments'].outputs.has_envs == 'true' && (
      github.event_name != 'workflow_dispatch' ||
      github.event.inputs.overrideAction == 'plan' || github.ref ==
      'refs/heads/main' ) }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs['discover-environments'].outputs.matrix) }}

    uses: hmcts/cnp-githubactions-library/.github/workflows/terraform-deploy-openId.yaml@main
    with:
      environment: ${{ matrix.environment }}
      subscription: ${{ vars[matrix.subscription_var] }}
      aks-subscription: ${{ vars[matrix.subscription_var] }}
      storage-account: ${{ vars[matrix.storage_account_var] }}
      azure-client-id: ${{ vars[matrix.azure_client_id_var] }}
      azure-subscription-id: ${{ vars[matrix.azure_subscription_id_var] }}
      state-store-resource-group: rg-sps-platform-${{ matrix.environment }}
      state-store-account-name: spsapimapi${{matrix.environment}}state
      state-store-container-name: terraform-state
      state-store-use-entra-id-auth: true
      working-directory: infrastructure
      plan-only: ${{ github.event_name == 'pull_request' || (github.event_name ==
        'workflow_dispatch' && github.event.inputs.overrideAction == 'plan') }}
      product: cp-crime-schedulingandlisting
      post-plan-to-pr: true
